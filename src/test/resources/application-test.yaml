spring:
  datasource:
    url: jdbc:h2:mem:video_streaming_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

storage:
  upload-dir: ${user.dir}/target/test-uploads

