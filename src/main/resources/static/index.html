<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoStream</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #252525;
      --border: #333;
      --accent: #e50914;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── AUTH ── */
    #auth-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }

    .auth-card h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .auth-card h1 span { color: var(--accent); }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      padding: .6rem;
      cursor: pointer;
      font-size: .95rem;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }

    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: .3rem;
      margin-top: .9rem;
    }

    input[type="text"], input[type="password"], input[type="email"],
    input[type="file"], textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: .55rem .75rem;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus, textarea:focus { border-color: var(--accent); }

    textarea { resize: vertical; min-height: 60px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      padding: .6rem 1.2rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: opacity .2s, background .2s;
    }

    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #c40812; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover:not(:disabled) { background: var(--surface2); }
    .btn-danger { background: #8b0000; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #a30000; }

    .btn-full { width: 100%; margin-top: 1.2rem; }

    .msg {
      font-size: .82rem;
      margin-top: .75rem;
      padding: .5rem .75rem;
      border-radius: 5px;
      display: none;
    }

    .msg.error { background: #3d0000; color: #ff6b6b; display: block; }
    .msg.success { background: #003d1a; color: #6bff9e; display: block; }

    /* ── APP ── */
    #app-view { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 1.2rem; }
    header h1 span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 1rem; }
    .header-right span { font-size: .85rem; color: var(--muted); }

    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    .section { margin-bottom: 2.5rem; }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* Upload form */
    .upload-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .upload-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }

    @media (max-width: 560px) { .upload-row { grid-template-columns: 1fr; } }

    .upload-actions { display: flex; gap: .75rem; margin-top: 1rem; }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: .75rem;
      overflow: hidden;
      display: none;
    }

    .progress-bar.visible { display: block; }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .3s;
      width: 0%;
    }

    /* Video grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
    }

    .video-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .video-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--muted);
      position: relative;
    }

    .video-thumb::after {
      content: '▶';
      position: absolute;
      font-size: 1.5rem;
      color: #fff;
      background: rgba(229,9,20,.8);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 44px;
      text-align: center;
    }

    .video-info { padding: .75rem; }
    .video-title { font-size: .9rem; font-weight: 600; margin-bottom: .25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-meta { font-size: .75rem; color: var(--muted); }

    .video-card-actions {
      display: flex;
      gap: .5rem;
      padding: 0 .75rem .75rem;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: .9rem;
    }

    /* Modal / player */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 820px;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 { font-size: .95rem; }

    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
    }

    .close-btn:hover { color: var(--text); }

    video {
      width: 100%;
      display: block;
      background: #000;
      max-height: 60vh;
    }

    .modal-body { padding: .75rem 1rem; }
    .modal-desc { font-size: .85rem; color: var(--muted); margin-top: .3rem; }

    .status-badge {
      display: inline-block;
      font-size: .7rem;
      padding: .15rem .5rem;
      border-radius: 99px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .status-UPLOADED   { background: #1a3a5c; color: #5bb0ff; }
    .status-PROCESSING { background: #3a2a00; color: #ffd166; }
    .status-READY      { background: #003a1a; color: #6bff9e; }
    .status-FAILED     { background: #3d0000; color: #ff6b6b; }

    .spinner {
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      width: 22px;
      height: 22px;
      animation: spin .7s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-row { display: flex; align-items: center; gap: .75rem; color: var(--muted); font-size: .9rem; padding: 2rem; }
  </style>
</head>
<body>

<!-- AUTH VIEW -->
<div id="auth-view">
  <div class="auth-card">
    <h1><span>Video</span>Stream</h1>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div id="tab-login" class="tab-pane active">
      <label for="l-username">Username</label>
      <input id="l-username" type="text" placeholder="your_username" autocomplete="username" />
      <label for="l-password">Password</label>
      <input id="l-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      <div id="login-msg" class="msg"></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Login</button>
    </div>

    <!-- Register -->
    <div id="tab-register" class="tab-pane">
      <label for="r-username">Username</label>
      <input id="r-username" type="text" placeholder="your_username" autocomplete="username" />
      <label for="r-email">Email</label>
      <input id="r-email" type="email" placeholder="you@example.com" autocomplete="email" />
      <label for="r-password">Password</label>
      <input id="r-password" type="password" placeholder="••••••••" autocomplete="new-password" />
      <div id="register-msg" class="msg"></div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP VIEW -->
<div id="app-view">
  <header>
    <h1><span>Video</span>Stream</h1>
    <div class="header-right">
      <span id="header-username"></span>
      <button class="btn btn-outline" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <main>
    <!-- Upload -->
    <section class="section">
      <div class="section-title">Upload Video</div>
      <div class="upload-card">
        <div class="upload-row">
          <div>
            <label for="u-title">Title</label>
            <input id="u-title" type="text" placeholder="My awesome video" />
          </div>
          <div>
            <label for="u-file">Video File</label>
            <input id="u-file" type="file" accept="video/*" />
          </div>
        </div>
        <label for="u-desc">Description (optional)</label>
        <textarea id="u-desc" placeholder="What's this video about?"></textarea>
        <div class="upload-actions">
          <button class="btn btn-primary" id="upload-btn" onclick="doUpload()">Upload</button>
        </div>
        <div class="progress-bar" id="upload-progress">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="upload-msg" class="msg"></div>
      </div>
    </section>

    <!-- My Videos -->
    <section class="section" id="my-videos-section">
      <div class="section-title">My Videos</div>
      <div id="my-videos-grid" class="video-grid">
        <div class="loading-row"><div class="spinner"></div> Loading…</div>
      </div>
    </section>

    <!-- All Videos -->
    <section class="section">
      <div class="section-title">All Videos</div>
      <div id="all-videos-grid" class="video-grid">
        <div class="loading-row"><div class="spinner"></div> Loading…</div>
      </div>
    </section>
  </main>
</div>

<!-- Player Modal -->
<div id="player-modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="close-btn" onclick="closePlayerModal()">✕</button>
    </div>
    <video id="modal-video" controls preload="metadata"></video>
    <div class="modal-body">
      <div id="modal-status"></div>
      <div id="modal-desc" class="modal-desc"></div>
    </div>
  </div>
</div>

<script>
  const API = '/api';
  let token = localStorage.getItem('vs_token');
  let currentUser = JSON.parse(localStorage.getItem('vs_user') || 'null');

  // ── INIT ──────────────────────────────────────────────────────────────────

  function init() {
    if (token && currentUser) {
      showApp();
    } else {
      showAuth();
    }
  }

  function showAuth() {
    document.getElementById('auth-view').style.display = 'flex';
    document.getElementById('app-view').style.display = 'none';
  }

  function showApp() {
    document.getElementById('auth-view').style.display = 'none';
    document.getElementById('app-view').style.display = 'block';
    document.getElementById('header-username').textContent = currentUser.username;
    loadAllVideos();
    loadMyVideos();
  }

  // ── TABS ──────────────────────────────────────────────────────────────────

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  // ── AUTH ──────────────────────────────────────────────────────────────────

  async function doLogin() {
    const username = document.getElementById('l-username').value.trim();
    const password = document.getElementById('l-password').value;
    const msg = document.getElementById('login-msg');

    if (!username || !password) { showMsg(msg, 'Please fill all fields.', 'error'); return; }

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (!res.ok) { showMsg(msg, 'Invalid username or password.', 'error'); return; }

      const data = await res.json();
      token = data.token;
      localStorage.setItem('vs_token', token);

      // Fetch user info by registering — we need the userId. Use a separate call.
      // We'll store username and fetch videos; userId comes from video ownership.
      currentUser = { username };
      localStorage.setItem('vs_user', JSON.stringify(currentUser));

      showMsg(msg, 'Login successful!', 'success');
      setTimeout(showApp, 400);

    } catch (e) {
      showMsg(msg, 'Network error. Is the server running?', 'error');
    }
  }

  async function doRegister() {
    const username = document.getElementById('r-username').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const password = document.getElementById('r-password').value;
    const msg = document.getElementById('register-msg');

    if (!username || !email || !password) { showMsg(msg, 'Please fill all fields.', 'error'); return; }

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, enabled: true })
      });

      if (!res.ok) { showMsg(msg, 'Registration failed. Username may already exist.', 'error'); return; }

      showMsg(msg, 'Account created! You can now log in.', 'success');
      setTimeout(() => switchTab('login'), 800);

    } catch (e) {
      showMsg(msg, 'Network error. Is the server running?', 'error');
    }
  }

  function doLogout() {
    token = null;
    currentUser = null;
    localStorage.removeItem('vs_token');
    localStorage.removeItem('vs_user');
    document.getElementById('modal-video').src = '';
    showAuth();
  }

  // ── UPLOAD ────────────────────────────────────────────────────────────────

  async function doUpload() {
    const title = document.getElementById('u-title').value.trim();
    const description = document.getElementById('u-desc').value.trim();
    const fileInput = document.getElementById('u-file');
    const msg = document.getElementById('upload-msg');
    const btn = document.getElementById('upload-btn');

    if (!title || !fileInput.files[0]) {
      showMsg(msg, 'Title and video file are required.', 'error');
      return;
    }

    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append('file', file);
    formData.append('title', title);
    if (description) formData.append('description', description);

    btn.disabled = true;
    const progress = document.getElementById('upload-progress');
    const fill = document.getElementById('progress-fill');
    progress.classList.add('visible');
    fill.style.width = '0%';
    showMsg(msg, '', '');

    try {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${API}/videos/upload`);
      xhr.setRequestHeader('Authorization', `Bearer ${token}`);

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) fill.style.width = `${Math.round(e.loaded / e.total * 90)}%`;
      };

      xhr.onload = () => {
        fill.style.width = '100%';
        btn.disabled = false;
        if (xhr.status === 201) {
          showMsg(msg, 'Video uploaded successfully!', 'success');
          document.getElementById('u-title').value = '';
          document.getElementById('u-desc').value = '';
          fileInput.value = '';
          setTimeout(() => { progress.classList.remove('visible'); fill.style.width = '0%'; }, 1000);
          loadAllVideos();
          loadMyVideos();
        } else if (xhr.status === 401) {
          showMsg(msg, 'Upload failed: not authorised. Try logging out and back in.', 'error');
          progress.classList.remove('visible');
        } else {
          showMsg(msg, `Upload failed (${xhr.status}).`, 'error');
          progress.classList.remove('visible');
        }
      };

      xhr.onerror = () => {
        btn.disabled = false;
        progress.classList.remove('visible');
        showMsg(msg, 'Network error during upload.', 'error');
      };

      xhr.send(formData);

    } catch (e) {
      btn.disabled = false;
      progress.classList.remove('visible');
      showMsg(msg, 'Upload failed.', 'error');
    }
  }

  // ── VIDEO LIST ────────────────────────────────────────────────────────────

  async function loadAllVideos() {
    const grid = document.getElementById('all-videos-grid');
    grid.innerHTML = '<div class="loading-row"><div class="spinner"></div> Loading…</div>';

    try {
      const res = await authFetch(`${API}/videos`);
      if (!res.ok) { grid.innerHTML = '<div class="empty-state">Failed to load videos.</div>'; return; }
      const videos = await res.json();
      renderGrid(grid, videos, false);
    } catch (e) {
      grid.innerHTML = '<div class="empty-state">Could not reach server.</div>';
    }
  }

  async function loadMyVideos() {
    const grid = document.getElementById('my-videos-grid');
    grid.innerHTML = '<div class="loading-row"><div class="spinner"></div> Loading…</div>';

    try {
      // Get all videos and filter by checking ownership via delete response would be too heavy.
      // Use GET /api/videos and match by trying to get each video's detail —
      // instead, use the "my videos" endpoint after we get the userId from an upload or we store it.
      // Simplest: load all and let the server's /user/{id} handle it.
      // We need userId; store it after first successful operation or parse from video list.

      // First load all videos to find current user's userId
      const allRes = await authFetch(`${API}/videos`);
      if (!allRes.ok) { grid.innerHTML = '<div class="empty-state">Failed to load.</div>'; return; }
      const allVideos = await allRes.json();

      // Try to find userId from any video by the current user
      // We'll attempt GET /api/videos/user/{id} for each candidate id found
      // Better: try to get userId by attempting getUserId
      const userId = await resolveUserId(allVideos);
      if (!userId) {
        grid.innerHTML = '<div class="empty-state">Upload a video to see your library here.</div>';
        return;
      }

      const res = await authFetch(`${API}/videos/user/${userId}`);
      if (res.status === 401 || res.status === 403) {
        grid.innerHTML = '<div class="empty-state">Upload a video to see your library here.</div>';
        return;
      }
      if (!res.ok) { grid.innerHTML = '<div class="empty-state">Failed to load your videos.</div>'; return; }
      const videos = await res.json();
      renderGrid(grid, videos, true);
    } catch (e) {
      grid.innerHTML = '<div class="empty-state">Could not reach server.</div>';
    }
  }

  // Resolve userId by testing /api/videos/user/{id} for candidate ids from allVideos
  async function resolveUserId(allVideos) {
    if (currentUser.userId) return currentUser.userId;

    // Collect unique userIds from all videos
    const ids = [...new Set(allVideos.map(v => v.userId).filter(Boolean))];

    for (const id of ids) {
      const res = await authFetch(`${API}/videos/user/${id}`);
      if (res.ok) {
        currentUser.userId = id;
        localStorage.setItem('vs_user', JSON.stringify(currentUser));
        return id;
      }
    }
    return null;
  }

  function renderGrid(container, videos, showDelete) {
    if (!videos.length) {
      container.innerHTML = '<div class="empty-state">No videos yet.</div>';
      return;
    }

    container.innerHTML = videos.map(v => `
      <div class="video-card">
        <div class="video-thumb" onclick="playVideo(${v.id}, '${escHtml(v.title)}', '${escHtml(v.description || '')}', '${v.status}')">🎬</div>
        <div class="video-info">
          <div class="video-title" title="${escHtml(v.title)}">${escHtml(v.title)}</div>
          <div class="video-meta">
            <span class="status-badge status-${v.status}">${v.status}</span>
            ${v.uploadTime ? ' · ' + formatTime(v.uploadTime) : ''}
          </div>
        </div>
        ${showDelete ? `
        <div class="video-card-actions">
          <button class="btn btn-danger" style="font-size:.78rem;padding:.3rem .75rem" onclick="doDelete(${v.id})">Delete</button>
        </div>` : ''}
      </div>
    `).join('');
  }

  async function doDelete(id) {
    if (!confirm('Delete this video?')) return;
    try {
      const res = await authFetch(`${API}/videos/${id}`, { method: 'DELETE' });
      if (res.ok || res.status === 204) {
        loadMyVideos();
        loadAllVideos();
      } else {
        alert('Failed to delete video.');
      }
    } catch (e) {
      alert('Network error.');
    }
  }

  // ── PLAYER ────────────────────────────────────────────────────────────────

  function playVideo(id, title, description, status) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-desc').textContent = description;
    document.getElementById('modal-status').innerHTML =
      `<span class="status-badge status-${status}">${status}</span>`;

    const videoEl = document.getElementById('modal-video');
    videoEl.src = `${API}/videos/${id}/stream?token=${encodeURIComponent(token)}`;
    videoEl.load();

    document.getElementById('player-modal').classList.add('open');
  }

  function closePlayerModal() {
    document.getElementById('player-modal').classList.remove('open');
    const videoEl = document.getElementById('modal-video');
    videoEl.pause();
    videoEl.src = '';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('player-modal')) closePlayerModal();
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────

  function authFetch(url, opts = {}) {
    return fetch(url, {
      ...opts,
      headers: { 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) }
    });
  }

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = `msg${type ? ' ' + type : ''}`;
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(t) {
    if (!t) return '';
    return t.toString().substring(0, 5);
  }

  // keyboard shortcut: Escape closes modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePlayerModal();
  });

  init();
</script>
</body>
</html>
